<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Specialty Coffee</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(135deg, #f3ede4 0%, #d9c7b0 100%);
  color: #3a2e22;
text-align: center;
padding: 24px;
}
.card { max-width: 480px; }
h1 {
  font-size: 2.8rem;
letter-spacing: 2px;
font-weight: 700;
margin-bottom: 12px;
}
p.tagline {
font-size: 1.1rem;
color: #6b5844;
margin-bottom: 36px;
letter-spacing: 1px;
}
a.btn {
display: inline-block;
text-decoration: none;
background: #3a2e22;
color: #f3ede4;
padding: 16px 40px;
border-radius: 40px;
font-size: 1rem;
letter-spacing: 1px;
transition: transform 0.15s ease, background 0.15s ease;
}
a.btn:hover { background: #5a4632; transform: translateY(-2px); }
footer { margin-top: 40px; font-size: 0.85rem; color: #8a7a66; }
</style>
  </head>
  <body>
  <div class="card">
  <h1>FLOW</h1>
  <p class="tagline">Specialty Coffee</p>
  <a class="btn" href="https://www.instagram.com/flowcafe.om/" target="_blank" rel="noopener">Follow us on Instagram</a>
  <footer>&copy; Flow Specialty Coffee</footer>
  </div>
  </body>
  </html>
